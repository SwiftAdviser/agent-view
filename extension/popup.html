<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Agent View</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <header class="top">
        <span class="mark" aria-hidden="true">A</span>
        <span class="identity">
          <span class="eyebrow" id="host">Current page</span>
          <span class="title">Agent View</span>
        </span>
      </header>

      <label class="mode">
        <input id="toggle" type="checkbox" aria-label="Toggle Agent View">
        <span class="copy">
          <span id="state">Human view</span>
          <span id="note">Flip to see what agents read</span>
        </span>
        <span class="track">
          <span class="thumb"></span>
        </span>
      </label>

      <p class="source" id="source">
        <span class="dot" aria-hidden="true"></span>
        <span id="sourceLabel">Ready</span>
      </p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
