<svg width="1280" height="800" viewBox="0 0 1280 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1280" height="800" fill="#F4F0E8"/>
  <rect x="56" y="54" width="1168" height="692" rx="18" fill="#111111"/>
  <rect x="56" y="54" width="1168" height="78" rx="18" fill="#111111"/>
  <path d="M56 114H1224" stroke="#2E2D2B" stroke-width="1"/>
  <text x="84" y="89" fill="#F5F2EA" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="800">Agent View</text>
  <text x="84" y="111" fill="#8F8B84" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600">No Markdown response · thespawn.io/check · HTTP 200 · text/html</text>
  <circle cx="1174" cy="93" r="22" fill="#181818" stroke="#454545" stroke-width="2"/>
  <path d="M1165 84L1183 102" stroke="#F5F2EA" stroke-width="4" stroke-linecap="round"/>
  <path d="M1183 84L1165 102" stroke="#F5F2EA" stroke-width="4" stroke-linecap="round"/>

  <text x="108" y="177" fill="#F5F2EA" font-family="Menlo, Consolas, monospace" font-size="22" font-weight="700"># No Markdown response</text>
  <text x="108" y="230" fill="#F5F2EA" font-family="Menlo, Consolas, monospace" font-size="18">This page did not return `text/markdown` when requested with:</text>
  <text x="108" y="277" fill="#F5F2EA" font-family="Menlo, Consolas, monospace" font-size="18">```http</text>
  <text x="108" y="306" fill="#F5F2EA" font-family="Menlo, Consolas, monospace" font-size="18">Accept: text/markdown, text/html;q=0.8, */*;q=0.1</text>
  <text x="108" y="335" fill="#F5F2EA" font-family="Menlo, Consolas, monospace" font-size="18">```</text>

  <text x="108" y="397" fill="#F5F2EA" font-family="Menlo, Consolas, monospace" font-size="18">Agent View only shows the Markdown the server actually provides.</text>
  <text x="108" y="426" fill="#F5F2EA" font-family="Menlo, Consolas, monospace" font-size="18">It does not convert the page locally.</text>

  <text x="108" y="488" fill="#F0C36A" font-family="Menlo, Consolas, monospace" font-size="22" font-weight="700">## Give this to your AI agent</text>
  <rect x="104" y="520" width="984" height="128" rx="8" fill="#181818" stroke="#303030"/>
  <text x="130" y="558" fill="#F5F2EA" font-family="Menlo, Consolas, monospace" font-size="17">Make this website support Markdown for Agents.</text>
  <text x="130" y="596" fill="#BDB8B2" font-family="Menlo, Consolas, monospace" font-size="16">Detect `Accept: text/markdown` and return:</text>
  <text x="130" y="628" fill="#F5F2EA" font-family="Menlo, Consolas, monospace" font-size="16">Content-Type: text/markdown; charset=utf-8</text>
  <text x="130" y="660" fill="#BDB8B2" font-family="Menlo, Consolas, monospace" font-size="16">Add `Vary: Accept`. Verify with curl.</text>

  <text x="84" y="712" fill="#8F8B84" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600">One switch tells you whether a site actually serves Markdown to AI agents.</text>
</svg>
