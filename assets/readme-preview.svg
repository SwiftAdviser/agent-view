<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="720" fill="#F7F5EF"/>
  <text x="80" y="150" fill="#151515" font-family="Inter, Arial, sans-serif" font-size="76" font-weight="800">See what AI agents read.</text>
  <text x="84" y="214" fill="#47433D" font-family="Inter, Arial, sans-serif" font-size="28">One switch turns the current page into Markdown.</text>
  <rect x="80" y="292" width="1040" height="318" rx="10" fill="#111111"/>
  <rect x="80" y="292" width="1040" height="58" rx="10" fill="#111111"/>
