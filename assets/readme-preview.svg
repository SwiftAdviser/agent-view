  <text x="112" y="330" fill="#F5F2EA" fill-opacity="0.62" font-family="Inter, Arial, sans-serif" font-size="20">Server Markdown · 3150 tokens</text>
  <text x="112" y="414" fill="#F5F2EA" font-family="Menlo, Consolas, monospace" font-size="26" font-weight="700"># Introducing Markdown for Agents</text>
  <text x="112" y="470" fill="#F5F2EA" font-family="Menlo, Consolas, monospace" font-size="22">The way content and businesses are discovered online is changing.</text>
  <text x="112" y="532" fill="#F5F2EA" font-family="Menlo, Consolas, monospace" font-size="24" font-weight="700">## Why markdown is important</text>
